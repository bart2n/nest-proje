version: '3.8'

services:
  backend:
    build:
      context: ./nest-rest
    container_name: nest-rest
    environment:
      - PORT=3000
      - FRONTEND_URL=http://localhost:5173
    ports:
      - '3000:3000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped
